---
layout: page
---
<header class="resume-header">
  <p class="resume-eyebrow">Resume</p>
  <h1 class="resume-name">{{ page.name }}</h1>
  <p class="resume-specialties">
    {{ page.role }}
    {%- for s in page.specialties %} · {{ s }}{%- endfor -%}
  </p>
  <p class="resume-summary">{{ page.summary }}</p>
</header>
{{ content }}
